name: build-check
on:
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # git identity is needed: the CLI tests create commits in throwaway temp repos
      - run: |
          git config --global user.email "ci@hcw.local"
          git config --global user.name "HCW CI"
      - run: npm test
